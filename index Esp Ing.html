<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cinabrio — Model Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #21212e;
    --border: rgba(255,255,255,0.09);
    --border-hover: rgba(255,255,255,0.22);
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12);
    --text: #f0eeff;
    --text-sec: #b8b4d0;
    --text-muted: #7a7690;
    --text-dim: #3e3c52;
    --lora-color: #c9a96e;
    --checkpoint-color: #a08bdf;
    --other-color: #7aaddf;
    --illus-color: #6bcba0;
    --pony-color: #df8bc0;
    --ctrl-h: 54px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 10; padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem; text-align: center;
  }
  .eyebrow { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); font-weight: 400; font-family: 'DM Sans', sans-serif; }
  h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 400; letter-spacing: 0.08em; line-height: 1.1; color: var(--text); }
  .sub { font-size: 0.85rem; color: var(--text-sec); margin-top: 0.25rem; letter-spacing: 0.02em; }

  /* ── Stats ── */
  .stats-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: center; gap: 2rem;
    padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; }
  .stat-val { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 600; color: var(--accent); }
  .stat-label { font-size: 0.68rem; color: var(--text-sec); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Sans', sans-serif; }

  /* ── Controls (sticky) ── */
  .controls {
    position: sticky; top: 0; z-index: 100;
    display: flex; flex-wrap: wrap; gap: 0.55rem; align-items: center;
    padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.96); backdrop-filter: blur(12px);
    min-height: var(--ctrl-h);
  }
  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 300px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  input[type="text"] {
    width: 100%; padding: 0.48rem 0.9rem 0.48rem 2.2rem;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 300;
    outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-muted); }
  .fg { display: flex; gap: 0.28rem; flex-wrap: wrap; align-items: center; }
  .vsep { width: 1px; height: 18px; background: var(--border); margin: 0 0.1rem; }
  .fb {
    padding: 0.36rem 0.82rem; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem; letter-spacing: 0.02em; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .fb:hover { border-color: var(--border-hover); color: var(--text-sec); }
  .fb.active        { background: var(--surface2); border-color: var(--accent);      color: var(--accent); }
  .fb.active.illus  { border-color: var(--illus-color); color: var(--illus-color); }
  .fb.active.pony   { border-color: var(--pony-color);  color: var(--pony-color);  }
  select.ss {
    padding: 0.36rem 0.72rem; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-sec); font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem; outline: none; cursor: pointer;
  }
  .rand-btns { display: flex; gap: 0.5rem; margin-left: auto; flex-wrap: wrap; }
  .rand-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0.5rem 1.15rem; border-radius: 5px; border: 1px solid rgba(107,203,160,0.4);
    background: rgba(107,203,160,0.07); color: #8ddfc0;
    font-family: 'DM Sans', sans-serif; font-size: 0.8rem; letter-spacing: 0.02em;
    cursor: pointer; transition: all 0.2s; white-space: nowrap; font-weight: 400;
  }
  .rand-btn:hover { background: rgba(107,203,160,0.15); border-color: #6bcba0; color: #a8ecd4; }
  .rand-btn.active-rand { background: rgba(107,203,160,0.18); border-color: #6bcba0; color: #b8f0df; }
  .rand-icon { display: inline-flex; transition: transform 0.4s ease; }
  .rand-btn:hover .rand-icon { transform: rotate(180deg); }

  /* ── Lang switcher ── */
  .lang-btn {
    padding: 0.32rem 0.7rem; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s;
    text-transform: uppercase; font-weight: 400;
  }
  .lang-btn:hover { border-color: var(--border-hover); color: var(--text-sec); }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── Main ── */
  main { position: relative; z-index: 10; max-width: 1600px; margin: 0 auto; padding: 2rem; }

  .spotlight-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
  .sec-title { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 400; letter-spacing: 0.06em; color: var(--text); }
  .sec-count { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 300; color: var(--text-muted); margin-left: 0.85rem; }

  .spotlight-grid { display: grid; gap: 1rem; margin-bottom: 3rem; grid-template-columns: repeat(5, 1fr); }

  /* ── Series list ── */
  .series-list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 0.55rem; }
  .series-entry {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 1rem; background: var(--surface); border: 1px solid var(--border);
    border-left: 2px solid transparent; border-radius: 6px;
    cursor: pointer; transition: all 0.18s; gap: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 300; text-align: left; width: 100%;
  }
  .series-entry:hover { border-color: var(--border-hover); background: var(--surface2); border-left-color: var(--accent); }
  .series-entry.active { background: var(--surface3); border-color: rgba(201,169,110,0.5); border-left-color: var(--accent); }
  .se-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Cinzel', serif; font-size: 0.82rem; font-weight: 400; letter-spacing: 0.04em; color: var(--text-sec); }
  .series-entry:hover .se-name, .series-entry.active .se-name { color: var(--text); }
  .se-count { font-size: 0.72rem; font-weight: 500; color: var(--text-sec); flex-shrink: 0; background: var(--surface3); padding: 0.15rem 0.6rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.14); font-family: 'DM Sans', sans-serif; min-width: 2rem; text-align: center; }
  .series-entry.active .se-count { color: var(--accent); border-color: rgba(201,169,110,0.45); background: var(--accent-dim); }

  /* ── Cards ── */
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; text-decoration: none; display: block; transition: border-color 0.2s, transform 0.2s; animation: fi 0.28s ease both; }
  @keyframes fi { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .ci { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: var(--surface2); }
  .ci img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .ph svg { opacity: 0.1; }
  .cb { padding: 0.7rem 0.75rem 0.75rem; }
  .cn { font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.22rem; }
  .cs { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 300; letter-spacing: 0.01em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.45rem; }
  .cs-link { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 300; letter-spacing: 0.01em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.45rem; display: block; cursor: pointer; transition: color 0.15s; background: none; border: none; padding: 0; text-align: left; width: 100%; }
  .cs-link:hover { color: #4dc8da; text-decoration: underline; text-underline-offset: 3px; }
  .ct { display: flex; gap: 0.25rem; flex-wrap: wrap; }
  .t  { font-size: 0.63rem; padding: 0.12rem 0.45rem; border-radius: 3px; border: 1px solid; font-family: 'DM Sans', sans-serif; }
  .tL { color: var(--lora-color);       border-color: rgba(201,169,110,0.35); background: rgba(201,169,110,0.09); }
  .tC { color: var(--checkpoint-color); border-color: rgba(160,139,223,0.35); background: rgba(160,139,223,0.09); }
  .tO { color: var(--other-color);      border-color: rgba(122,173,223,0.35); background: rgba(122,173,223,0.09); }
  .tI { color: var(--illus-color);      border-color: rgba(107,203,160,0.35); background: rgba(107,203,160,0.09); }
  .tP { color: var(--pony-color);       border-color: rgba(223,139,192,0.35); background: rgba(223,139,192,0.09); }

  /* ── Loading strip ── */
  .load-strip { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: rgba(10,10,15,0.92); border-top: 1px solid var(--border); padding: 0.6rem 1.5rem; align-items: center; gap: 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--text-sec); }
  .load-strip.visible { display: flex; }
  .sp-sm { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-bar-wrap { flex: 1; height: 2px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .load-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

  /* ── Splash ── */
  .splash { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; gap: 1.5rem; }
  .sp-lg { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .splash-txt { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-sec); font-family: 'DM Sans', sans-serif; }

  .empty { text-align: center; padding: 3rem 2rem; color: var(--text-muted); font-size: 0.88rem; }
  .err { background: rgba(203,107,107,0.1); border: 1px solid rgba(203,107,107,0.3); color: #e09090; padding: 1rem 1.5rem; border-radius: 6px; font-size: 0.84rem; }

  footer { position: relative; z-index: 10; text-align: center; padding: 1.25rem; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.06em; margin-top: 3rem; }
  footer a { color: var(--text-sec); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  @media (max-width: 1100px) { .spotlight-grid, .grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 850px)  { .spotlight-grid, .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) {
    header { padding: 2rem 1rem 1.5rem; }
    main { padding: 1.1rem 0.9rem; }
    .controls { padding: 0.7rem 0.9rem; }
    .spotlight-grid, .grid { grid-template-columns: repeat(2, 1fr); }
    .rand-btns { margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow" id="txt-eyebrow"></div>
  <h1>Cinabrio</h1>
  <div class="sub" id="txt-sub"></div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-val" id="sTotal">—</span><span class="stat-label" id="txt-stat-models"></span></div>
  <div class="stat"><span class="stat-val" id="sSeries">—</span><span class="stat-label" id="txt-stat-series"></span></div>
  <div class="stat"><span class="stat-val" id="sIllus">—</span><span class="stat-label">Illustrious</span></div>
  <div class="stat"><span class="stat-val" id="sPony">—</span><span class="stat-label">Pony</span></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="q" oninput="onSearch()"/>
  </div>
  <div class="fg">
    <button class="fb active" data-g="type" data-v="all"        onclick="setF(this,'type')" id="fb-all-type"></button>
    <button class="fb"        data-g="type" data-v="LORA"       onclick="setF(this,'type')">LoRA</button>
    <button class="fb"        data-g="type" data-v="Checkpoint" onclick="setF(this,'type')">Checkpoint</button>
  </div>
  <div class="vsep"></div>
  <div class="fg">
    <button class="fb active" data-g="base" data-v="all"         onclick="setF(this,'base')" id="fb-all-base"></button>
    <button class="fb illus"  data-g="base" data-v="illustrious" onclick="setF(this,'base')">Illustrious</button>
    <button class="fb pony"   data-g="base" data-v="pony"        onclick="setF(this,'base')">Pony</button>
  </div>
  <select class="ss" id="sortSel" onchange="onSortChange()">
    <option value="newest" id="opt-newest"></option>
    <option value="name"   id="opt-name"></option>
    <option value="downloads" id="opt-downloads"></option>
  </select>
  <div class="rand-btns">
    <button class="rand-btn active-rand" id="btnChar" onclick="setMode('char')">
      <span class="rand-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></span>
      <span id="txt-btn-char"></span>
    </button>
    <button class="rand-btn" id="btnColl" onclick="setMode('collection')">
      <span class="rand-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></span>
      <span id="txt-btn-coll"></span>
    </button>
  </div>
  <div class="vsep"></div>
  <button class="lang-btn active" id="langEN" onclick="setLang('en')">EN</button>
  <button class="lang-btn"        id="langES" onclick="setLang('es')">ES</button>
</div>

<div class="load-strip" id="loadStrip">
  <div class="sp-sm"></div>
  <span id="loadTxt"></span>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
</div>

<main id="main">
  <div class="splash" id="splash">
    <div class="sp-lg"></div>
    <div class="splash-txt" id="splashTxt"></div>
  </div>

  <div id="viewError" class="err" style="display:none"></div>

  <div id="viewBrowse" style="display:none">
    <div style="margin-bottom:1.25rem; padding-bottom:0.75rem; border-bottom:1px solid var(--border);">
      <div style="font-family:'Cinzel',serif; font-size:1rem; font-weight:400; letter-spacing:0.06em; color:var(--text-sec);" id="browseTitle"></div>
      <div style="font-size:0.74rem; color:var(--text-muted); margin-top:0.2rem;" id="browseCount"></div>
    </div>
    <div class="grid" id="browseGrid"></div>
  </div>

  <div id="viewHome" style="display:none">
    <div class="spotlight-header">
      <div>
        <span class="sec-title" id="spotTitle"></span>
        <span class="sec-count" id="spotCount"></span>
      </div>
    </div>
    <div class="spotlight-grid" id="spotGrid"></div>

    <div style="margin-bottom:1.1rem; padding-bottom:0.75rem; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:0.75rem;">
      <span class="sec-title" id="txt-explore"></span>
      <span class="sec-count" id="seriesListCount"></span>
    </div>
    <div class="series-list-grid" id="seriesListGrid"></div>
  </div>
</main>

<footer id="footer-text"></footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// i18n
// ─────────────────────────────────────────────────────────────────────────────
const STRINGS = {
  en: {
    title:         'Model Collection',
    sub:           'Anime · Manga · Video Game Characters',
    statModels:    'Models',
    statSeries:    'Series',
    allType:       'All',
    allBase:       'All',
    newest:        'Newest',
    nameAZ:        'Name A–Z',
    downloads:     'Most Downloaded',
    btnChar:       'Random Character',
    btnColl:       'Random Collection',
    searchPH:      'Search character or series…',
    spotRandom:    'Random Selection',
    explore:       'Explore by Series',
    seriesCount:   n => `${n} series`,
    modelCount:    n => `${n} model${n!==1?'s':''}`,
    loading:       'Connecting to Civitai…',
    loadingN:      (n,t) => t>0 ? `Loading models… ${n} / ${t}` : `Loading models… ${n}`,
    noModels:      'No models available.',
    noResults:     'No results found.',
    noCollModels:  'No models with current filter.',
    resultsFor:    q => `Results for "${q}"`,
    error:         e => `Could not connect to Civitai: ${e}. Reload to try again.`,
    footer:        'Live data via <a href="https://civitai.com/user/Cinabrio" target="_blank" rel="noopener">Civitai API</a> · Cinabrio &copy; 2025',
    unclassified:  'Unclassified',
  },
  es: {
    title:         'Colección de Modelos IA',
    sub:           'Personajes de Anime · Manga · Videojuegos',
    statModels:    'Modelos',
    statSeries:    'Series',
    allType:       'Todos',
    allBase:       'Todos',
    newest:        'Más recientes',
    nameAZ:        'Nombre A–Z',
    downloads:     'Más descargados',
    btnChar:       'Personaje aleatorio',
    btnColl:       'Colección aleatoria',
    searchPH:      'Buscar personaje o serie…',
    spotRandom:    'Selección aleatoria',
    explore:       'Explorar por serie',
    seriesCount:   n => `${n} series`,
    modelCount:    n => `${n} modelo${n!==1?'s':''}`,
    loading:       'Conectando con Civitai…',
    loadingN:      (n,t) => t>0 ? `Cargando modelos… ${n} / ${t}` : `Cargando modelos… ${n}`,
    noModels:      'Sin modelos disponibles.',
    noResults:     'No se encontraron resultados.',
    noCollModels:  'No hay modelos con el filtro actual.',
    resultsFor:    q => `Resultados para "${q}"`,
    error:         e => `No se pudo conectar con Civitai: ${e}. Recarga para intentar de nuevo.`,
    footer:        'Datos en tiempo real via <a href="https://civitai.com/user/Cinabrio" target="_blank" rel="noopener">Civitai API</a> · Cinabrio &copy; 2025',
    unclassified:  'Sin clasificar',
  }
};

let lang = 'en';
function t() { return STRINGS[lang]; }

function applyLang() {
  const s = t();
  document.documentElement.lang = lang;
  document.title = `Cinabrio — ${s.title}`;
  document.getElementById('txt-eyebrow').textContent   = s.title;
  document.getElementById('txt-sub').textContent       = s.sub;
  document.getElementById('txt-stat-models').textContent = s.statModels;
  document.getElementById('txt-stat-series').textContent = s.statSeries;
  document.getElementById('fb-all-type').textContent   = s.allType;
  document.getElementById('fb-all-base').textContent   = s.allBase;
  document.getElementById('opt-newest').textContent    = s.newest;
  document.getElementById('opt-name').textContent      = s.nameAZ;
  document.getElementById('opt-downloads').textContent = s.downloads;
  document.getElementById('txt-btn-char').textContent  = s.btnChar;
  document.getElementById('txt-btn-coll').textContent  = s.btnColl;
  document.getElementById('q').placeholder             = s.searchPH;
  document.getElementById('txt-explore').textContent   = s.explore;
  document.getElementById('footer-text').innerHTML     = s.footer;
  document.getElementById('splashTxt').textContent     = s.loading;
  document.getElementById('langEN').classList.toggle('active', lang==='en');
  document.getElementById('langES').classList.toggle('active', lang==='es');

  // Re-render whatever is currently visible
  if (all.length > 0) {
    renderSpotlight();
    renderSeriesList();
    const q = document.getElementById('q').value.toLowerCase().trim();
    if (q) onSearch();
    updateProgress();
  }
}

function setLang(l) {
  lang = l;
  applyLang();
}

// ─────────────────────────────────────────────────────────────────────────────
// App state
// ─────────────────────────────────────────────────────────────────────────────
const USER = 'Cinabrio';
let all        = [];
let groups     = {};
let seriesKeys = [];
let aType      = 'all';
let aBase      = 'all';
let spotMode   = 'char';
let activeSeries   = null;
let loadingDone    = false;
let estimatedTotal = 0;

const nameToIdx = new Map();
const idxToName = [];

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function parse(m) {
  const raw = m.name || '';
  const i   = raw.indexOf(' | ');
  return i !== -1
    ? { char: raw.slice(0,i).trim(), series: raw.slice(i+3).trim() }
    : { char: raw.trim(), series: t().unclassified };
}
function getBase(m) {
  const bm = (m.modelVersions?.[0]?.baseModel || '').toLowerCase();
  if (bm.includes('illustrious') || bm.includes('noob')) return 'illustrious';
  if (bm.includes('pony'))  return 'pony';
  if (bm.includes('flux'))  return 'flux';
  if (bm.includes('sdxl'))  return 'sdxl';
  if (bm.includes('sd 1'))  return 'sd15';
  return 'other';
}
function thumb(m) {
  try {
    const imgs = m.modelVersions?.[0]?.images;
    if (imgs?.length) {
      const s = imgs.find(i => (i.nsfwLevel||'None')==='None') || imgs[0];
      if (s?.url) return s.url.replace('/original/','/width=400/');
    }
  } catch(_) {}
  return null;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
// Cards
// ─────────────────────────────────────────────────────────────────────────────
const PH = `<div class="ph"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
window.__PH = PH;

function typeTag(type) {
  const lbl = {LORA:'LoRA',LoCon:'LyCORIS',Checkpoint:'Checkpoint',TextualInversion:'TI',Hypernetwork:'HN'}[type]||type;
  const cls = (type==='LORA'||type==='LoCon')?'tL':type==='Checkpoint'?'tC':'tO';
  return `<span class="t ${cls}">${lbl}</span>`;
}
function baseTag(b) {
  if (b==='illustrious') return '<span class="t tI">Illustrious</span>';
  if (b==='pony')        return '<span class="t tP">Pony</span>';
  return '';
}
function cardHTML(m, linkSeries) {
  const {char,series} = parse(m);
  const img = thumb(m);
  const b   = getBase(m);
  const url = `https://civitai.com/models/${m.id}`;
  const imgEl = img
    ? `<img src="${img}" alt="" loading="lazy" onerror="this.parentElement.innerHTML=window.__PH"/>`
    : PH;
  const seriesEl = linkSeries
    ? `<button class="cs-link" onclick="event.preventDefault();event.stopPropagation();openSeriesByName('${esc(series)}')" title="${esc(series)}">${esc(series)}</button>`
    : `<div class="cs">${esc(series)}</div>`;
  return `<a class="card" href="${url}" target="_blank" rel="noopener">
    <div class="ci">${imgEl}</div>
    <div class="cb">
      <div class="cn">${esc(char)}</div>
      ${seriesEl}
      <div class="ct">${typeTag(m.type)}${baseTag(b)}</div>
    </div>
  </a>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Filtering & sorting
// ─────────────────────────────────────────────────────────────────────────────
function applyTypeBase(list) {
  return list.filter(m => {
    const tOk = aType==='all'||m.type===aType||(aType==='LORA'&&m.type==='LoCon');
    const bOk = aBase==='all'||getBase(m)===aBase;
    return tOk&&bOk;
  });
}
function sortList(list) {
  const s = document.getElementById('sortSel').value;
  const c = [...list];
  if      (s==='name')      c.sort((a,b)=>parse(a).char.localeCompare(parse(b).char));
  else if (s==='downloads') c.sort((a,b)=>(b.stats?.downloadCount||0)-(a.stats?.downloadCount||0));
  else                      c.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  return c;
}

// ─────────────────────────────────────────────────────────────────────────────
// Spotlight
// ─────────────────────────────────────────────────────────────────────────────
function renderSpotlight() {
  const grid = document.getElementById('spotGrid');
  grid.className = 'spotlight-grid';

  if (spotMode === 'char') {
    const picks = pickRandom(applyTypeBase(all).filter(m=>thumb(m)), 5);
    document.getElementById('spotTitle').textContent = t().spotRandom;
    document.getElementById('spotCount').textContent = '';
    grid.innerHTML = picks.map(m=>cardHTML(m,true)).join('') || `<div class="empty">${t().noModels}</div>`;

  } else if (spotMode === 'collection') {
    const keys = Object.keys(groups);
    if (!keys.length) return;
    const name  = keys[Math.floor(Math.random()*keys.length)];
    const items = sortList(applyTypeBase(groups[name]||[]));
    document.getElementById('spotTitle').textContent = name;
    document.getElementById('spotCount').textContent = t().modelCount(items.length);
    grid.innerHTML = items.map(m=>cardHTML(m,false)).join('') || `<div class="empty">${t().noModels}</div>`;
    activeSeries = null;
    renderSeriesList();

  } else if (spotMode === 'manual' && activeSeries) {
    const items = sortList(applyTypeBase(groups[activeSeries]||[]));
    document.getElementById('spotTitle').textContent = activeSeries;
    document.getElementById('spotCount').textContent = t().modelCount(items.length);
    grid.innerHTML = items.map(m=>cardHTML(m,false)).join('') || `<div class="empty">${t().noCollModels}</div>`;
  }
}

function pickRandom(pool, n) {
  const picks=[], used=new Set();
  let tries=0;
  while (picks.length<n && picks.length<pool.length && tries<pool.length*3) {
    const i=Math.floor(Math.random()*pool.length);
    if (!used.has(i)) { used.add(i); picks.push(pool[i]); }
    tries++;
  }
  return picks;
}

// ─────────────────────────────────────────────────────────────────────────────
// Mode & series
// ─────────────────────────────────────────────────────────────────────────────
function setMode(mode) {
  spotMode = mode;
  activeSeries = null;
  document.getElementById('btnChar').classList.toggle('active-rand', mode==='char');
  document.getElementById('btnColl').classList.toggle('active-rand', mode==='collection');
  renderSpotlight();
  renderSeriesList();
}

function renderSeriesList() {
  document.getElementById('seriesListCount').textContent = t().seriesCount(seriesKeys.length);
  document.getElementById('seriesListGrid').innerHTML = seriesKeys.map(s => {
    const idx = nameToIdx.get(s);
    const cnt = (groups[s]||[]).length;
    return `<button class="series-entry${s===activeSeries?' active':''}" onclick="openSeriesManual(${idx})">
      <span class="se-name">${esc(s)}</span>
      <span class="se-count">${cnt}</span>
    </button>`;
  }).join('');
}

function openSeriesManual(idx) {
  const name = idxToName[idx];
  if (!name) return;
  if (activeSeries===name && spotMode==='manual') {
    activeSeries=null; spotMode='char';
    document.getElementById('btnChar').classList.add('active-rand');
    document.getElementById('btnColl').classList.remove('active-rand');
    renderSpotlight(); renderSeriesList();
    document.getElementById('spotGrid').scrollIntoView({behavior:'smooth',block:'start'});
    return;
  }
  activeSeries=name; spotMode='manual';
  document.getElementById('btnChar').classList.remove('active-rand');
  document.getElementById('btnColl').classList.remove('active-rand');
  renderSpotlight(); renderSeriesList();
  document.getElementById('spotGrid').scrollIntoView({behavior:'smooth',block:'start'});
}

function openSeriesByName(name) {
  const idx = nameToIdx.get(name);
  if (idx!==undefined) openSeriesManual(idx);
}

// ─────────────────────────────────────────────────────────────────────────────
// Search
// ─────────────────────────────────────────────────────────────────────────────
function onSearch() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  if (!q) {
    document.getElementById('viewBrowse').style.display='none';
    document.getElementById('viewHome').style.display='';
    return;
  }
  const results = sortList(applyTypeBase(all).filter(m=>{
    const {char,series}=parse(m);
    return char.toLowerCase().includes(q)||series.toLowerCase().includes(q);
  }));
  document.getElementById('browseTitle').textContent = t().resultsFor(q);
  document.getElementById('browseCount').textContent = t().modelCount(results.length);
  document.getElementById('browseGrid').innerHTML = results.length
    ? results.map(m=>cardHTML(m,true)).join('')
    : `<div class="empty" style="grid-column:1/-1">${t().noResults}</div>`;
  document.getElementById('viewHome').style.display='none';
  document.getElementById('viewBrowse').style.display='';
}

function onSortChange() {
  const q=document.getElementById('q').value.toLowerCase().trim();
  if (q) onSearch(); else renderSpotlight();
}

function setF(btn,g) {
  document.querySelectorAll(`[data-g="${g}"]`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (g==='type') aType=btn.dataset.v;
  if (g==='base') aBase=btn.dataset.v;
  const q=document.getElementById('q').value.toLowerCase().trim();
  if (q) onSearch(); else { renderSpotlight(); renderSeriesList(); }
}

// ─────────────────────────────────────────────────────────────────────────────
// Stats & groups
// ─────────────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('sTotal').textContent  = all.length.toLocaleString();
  document.getElementById('sSeries').textContent = seriesKeys.length;
  document.getElementById('sIllus').textContent  = all.filter(m=>getBase(m)==='illustrious').length;
  document.getElementById('sPony').textContent   = all.filter(m=>getBase(m)==='pony').length;
}

function rebuildGroups() {
  groups={};
  all.forEach(m=>{ const s=parse(m).series; (groups[s]||(groups[s]=[])).push(m); });
  seriesKeys=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);
  nameToIdx.clear(); idxToName.length=0;
  seriesKeys.forEach((name,i)=>{ nameToIdx.set(name,i); idxToName[i]=name; });
}

// ─────────────────────────────────────────────────────────────────────────────
// API load
// ─────────────────────────────────────────────────────────────────────────────
function updateProgress() {
  const pct = estimatedTotal>0 ? Math.min(100,Math.round(all.length/estimatedTotal*100)) : 0;
  document.getElementById('loadBar').style.width = pct+'%';
  document.getElementById('loadTxt').textContent = t().loadingN(all.length, estimatedTotal);
}

async function fetchPage(cursor) {
  let url=`https://civitai.com/api/v1/models?username=${USER}&limit=100&sort=Newest&nsfw=true`;
  if (cursor) url+=`&cursor=${encodeURIComponent(cursor)}`;
  const res=await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadAll() {
  document.getElementById('splash').style.display='flex';
  try {
    const first=await fetchPage(null);
    all.push(...(first.items||[]));
    estimatedTotal=first.metadata?.totalItems||0;
    rebuildGroups(); updateStats();

    document.getElementById('splash').style.display='none';
    document.getElementById('viewHome').style.display='';
    renderSpotlight(); renderSeriesList();

    let cursor=first.metadata?.nextCursor||null;
    if (cursor) {
      document.getElementById('loadStrip').classList.add('visible');
      updateProgress();
      let page=0;
      while (cursor && page<50) {
        await new Promise(r=>setTimeout(r,220));
        const data=await fetchPage(cursor);
        all.push(...(data.items||[]));
        cursor=data.metadata?.nextCursor||null;
        page++;
        rebuildGroups(); updateStats(); updateProgress();
        const q=document.getElementById('q').value.toLowerCase().trim();
        if (!q) {
          renderSeriesList();
          if (spotMode==='manual'&&activeSeries) {
            document.getElementById('spotCount').textContent=t().modelCount((groups[activeSeries]||[]).length);
          }
        }
      }
      loadingDone=true;
      document.getElementById('loadStrip').classList.remove('visible');
    }
  } catch(e) {
    document.getElementById('splash').style.display='none';
    const el=document.getElementById('viewError');
    el.textContent=t().error(e.message);
    el.style.display='block';
    document.getElementById('loadStrip').classList.remove('visible');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
applyLang();
loadAll();
</script>
</body>
</html>
